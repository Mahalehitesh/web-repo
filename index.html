<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS CI/CD Website</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav>
        <h2>🚀 MySite</h2>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#features">Features</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>🔥 Deployed using AWS CI/CD</h1>
        <p id="msg">Your website is LIVE using S3 + CodePipeline 🚀</p>
        <button onclick="changeText()">Click Me</button>
    </section>

    <!-- About -->
    <section id="about">
        <h2>About Project</h2>
        <p>This website is automatically deployed using GitHub → CodePipeline → S3.</p>
    </section>

    <!-- Features -->
    <section id="features">
        <h2>Features</h2>
        <div class="card-container">
            <div class="card">⚡ Fast Deployment</div>
            <div class="card">☁️ AWS Cloud</div>
            <div class="card">🔄 Auto Update</div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>Made with ❤️ using AWS</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
